<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Translator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Subtitle Translator</h1>
        <form id="upload-form">
            <div class="form-group">
                <label for="file">Upload .srt File</label>
                <input type="file" class="form-control-file" id="file" accept=".srt" required>
            </div>
            <button type="submit" class="btn btn-primary">Translate</button>
        </form>
        <div class="progress mt-3" style="display: none;">
            <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0"
                aria-valuemax="100">0%</div>
        </div>
        <div id="download-link" class="mt-3" style="display: none;">
            <a href="#" class="btn btn-success">Download Translated Subtitles</a>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
