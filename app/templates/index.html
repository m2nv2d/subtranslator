<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-r from-blue-100 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-12">
        <h1 class="text-5xl font-bold mb-12 text-center text-indigo-700 animate__animated animate__fadeInDown">
            <i class="fas fa-language mr-4"></i>Subtitle Translator
        </h1>
        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8 animate__animated animate__fadeInUp">
            <form id="upload-form" class="space-y-6">
                <div class="relative">
                    <input type="file" class="hidden" id="file" accept=".srt" required>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md cursor-pointer hover:border-indigo-500 transition duration-300"
                        onclick="document.getElementById('file').click();">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-cloud-upload-alt text-5xl text-gray-400"></i>
                            <p class="text-xs text-gray-500">Click to upload .srt file (up to 0.5MB)</p>
                        </div>
                    </div>
                    <p id="file-name" class="mt-2 text-sm text-gray-500 text-center"></p>
                </div>
                <button type="submit"
                    class="w-full py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300">
                    <i class="fas fa-sync-alt mr-2"></i>Translate
                </button>
            </form>
        </div>
        <div id="download-link" class="mt-8 text-center hidden animate__animated animate__fadeIn">
            <a href="#"
                class="inline-flex items-center px-6 py-3 border border-transparent text-lg font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-300">
                <i class="fas fa-download mr-2"></i>Download Translated Subtitles
            </a>
        </div>
        <div id="debug-info" class="mt-8 bg-white rounded-xl shadow-lg p-6 hidden animate__animated animate__fadeIn">
            <h3 class="text-xl font-semibold mb-4 text-indigo-700">Debug Information</h3>
            <ul class="space-y-2 text-gray-700">
                <li><i class="fas fa-cubes mr-2"></i>Number of chunks: <span id="num-chunks" class="font-bold"></span>
                </li>
                <li><i class="fas fa-list-ol mr-2"></i>Total number of entries: <span id="total-entries"
                        class="font-bold"></span></li>
                <li><i class="fas fa-check-circle mr-2"></i>Number of successful translations: <span id="num-success"
                        class="font-bold"></span></li>
            </ul>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
