<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Translator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Subtitle Translator</h1>
        <form id="upload-form">
            <div class="form-group">
                <label for="file">Upload .srt File</label>
                <input type="file" class="form-control-file" id="file" accept=".srt" required>
            </div>
            <button type="submit" class="btn btn-primary">Translate</button>
        </form>
        <div id="translation-status" class="mt-3" style="display: none;">
            Translation Status: <span id="responses-received">0</span> / <span id="total-chunks">0</span>
        </div>
        <div id="download-link" class="mt-3" style="display: none;">
            <a href="#" class="btn btn-success">Download Translated Subtitles</a>
        </div>
        <div id="debug-info" class="mt-3" style="display: none;">
            <h3>Debug Information</h3>
            <ul>
                <li>Number of chunks: <span id="num-chunks"></span></li>
                <li>Total number of entries: <span id="total-entries"></span></li>
                <li>Number of successful translations: <span id="num-success"></span></li>
            </ul>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
